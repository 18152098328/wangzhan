      const key = new URLSearchParams(location.search).get("page") || "club";
      const root = document.getElementById("detail-root");

      function renderCourse(data) {
        document.title = `${data.kicker}｜麦总出海俱乐部`;
        root.innerHTML = `
          <section class="course-hero ${data.theme}">
            <div>
              <p>${data.kicker}</p>
              <h1>${data.title}</h1>
              <span>${data.summary}</span>
              <div class="course-actions">
                <a href="detail.html?page=contact">${data.primaryAction}</a>
                <a class="ghost" href="detail.html?page=join">加入俱乐部</a>
              </div>
            </div>
            <img src="${data.image}" alt="${data.kicker}" />
          </section>

          <section class="panel course-section">
            <div class="section-title">
              <h2>${data.stagesTitle}</h2>
              <a href="detail.html?page=contact">预约咨询</a>
            </div>
            <div class="course-timeline">
              ${data.stages.map(stage => `
                <article>
                  <div class="course-stage-head">
                    <span>${stage.tag}</span>
                    <h3>${stage.title}</h3>
                  </div>
                  <div class="course-blocks">
                    ${stage.blocks.map(block => `
                      <div>
                        <b>${block[0]}</b>
                        <p>${block[1]}</p>
                      </div>
                    `).join("")}
                  </div>
                </article>
              `).join("")}
            </div>
          </section>

          <section class="panel course-section">
            <div class="section-title">
              <h2>学完获得</h2>
              <a href="detail.html?page=join">加入俱乐部</a>
            </div>
            <div class="course-gains">
              ${data.gains.map(item => `<article><span></span><b>${item}</b></article>`).join("")}
            </div>
          </section>

          <section class="panel course-section">
            <div class="section-title">
              <h2>适合对象</h2>
              <a href="detail.html?page=course">返回课程</a>
            </div>
            <div class="course-audience">
              ${data.audience.map((item, index) => `
                <article>
                  <strong>${String(index + 1).padStart(2, "0")}</strong>
                  <p>${item}</p>
                </article>
              `).join("")}
            </div>
          </section>

          <section class="course-cta ${data.theme}">
            <h2>${data.ctaTitle}</h2>
            <p>${data.ctaText}</p>
            <div>
              <a href="detail.html?page=contact">预约咨询</a>
              <a href="detail.html?page=join">加入俱乐部</a>
            </div>
          </section>
        `;
      }

      function renderGeneric(data) {
        document.title = `${data.kicker}｜麦总出海俱乐部`;
        root.innerHTML = `
          <section class="service-hero">
            <div>
              <p>${data.kicker}</p>
              <h1>${data.title}</h1>
              <span>${data.summary}</span>
            </div>
            <img src="${data.image}" alt="${data.kicker}" />
          </section>

          <section class="panel service-directory">
            <div class="section-title">
              <h2>服务内容</h2>
              <a href="index.html">返回首页</a>
            </div>
            <div class="directory-grid">
              ${data.items.map((item, index) => `
                <article>
                  <span>${String(index + 1).padStart(2, "0")}</span>
                  <h3>${item.split("：")[0]}</h3>
                  <p>${item.includes("：") ? item.split("：").slice(1).join("：") : "围绕该模块提供诊断、规划、执行与资源支持。"}</p>
                  <b>输出：清晰动作建议与落地路径</b>
                </article>
              `).join("")}
            </div>
          </section>

          <section class="panel shelf">
            <div class="section-title">
              <h2>适合对象</h2>
              <a href="detail.html?page=join">加入俱乐部</a>
            </div>
            <div class="metrics">
              ${[
                ["制造企业老板", "判断方向", "希望从内贸转外贸，先明确市场、产品和投入顺序。"],
                ["外贸负责人", "提升效率", "需要优化获客、客户管理、团队执行和成交流程。"],
                ["品牌出海团队", "搭建阵地", "希望建设独立站、社媒矩阵和海外品牌内容。"],
                ["产业带企业", "整合资源", "需要链接课程、服务商、物流、展会和海外渠道。"]
              ].map(item => `<article><strong>${item[0]}</strong><span>${item[1]}</span><p>${item[2]}</p></article>`).join("")}
            </div>
          </section>

          <section class="banner-pair">
            <article>
              <h2>预约出海诊断</h2>
              <p>先判断方向，再配置课程、团队、渠道与资源。</p>
              <span>立即预约</span>
            </article>
            <article>
              <h2>加入麦总出海俱乐部</h2>
              <p>链接课程、资源与全球市场。</p>
              <span>加入俱乐部</span>
            </article>
          </section>
        `;
      }

      if (coursePages[key]) {
        renderCourse(coursePages[key]);
      } else {
        renderGeneric(pageData[aliases[key] || key] || pageData.club);
      }
    </script>
  </body>
</html>
